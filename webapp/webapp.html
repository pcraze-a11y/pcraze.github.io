<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App</title>
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <link rel="stylesheet" href="../CSS/custom.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">&larr; Back to Main</a>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="mb-3">Click the Button</h1>
        <p class="text-muted">We ran out of budget. The more you click the higher the number goes! YAY!</p>

        <div class="card mt-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Click Counter</h5>
                <p class="card-text">You have clicked the button <strong id="countDisplay">0</strong> times.</p>
                <button id="myButton" class="btn btn-primary">Click me</button>
                <button id="resetButton" class="btn btn-outline-secondary">Reset</button>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">
                <a class="text-white" href="../HTML/AboutMe.html">Back to About Me</a>
                &middot;
                <a class="text-white" href="../index.html">Home</a>
            </p>
        </div>
    </footer>

    <script src="../CSS/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
